name = "nestjs-api"
main = "worker-cf.mjs"
compatibility_date = "2026-05-28"

compatibility_flags = ["nodejs_compat"]

# CF Workers forbids crypto.randomUUID() in global (module-init) scope.
# @nestjs/typeorm calls generateString() = crypto.randomUUID() during @Module
# decorator evaluation (global scope). We redirect the call to a counter-based
# function (globalThis.__cfRUUID) set up by setup-cf.mjs before worker.js loads.
[define]
"crypto.randomUUID" = "globalThis.__cfRUUID"

[alias]
"@nestjs/websockets/socket-module" = "./stubs/empty"
"@nestjs/microservices/microservices-module" = "./stubs/empty"
"@nestjs/microservices" = "./stubs/empty"
"class-transformer/storage" = "./stubs/class-transformer-storage"
"expo-sqlite" = "./stubs/empty"