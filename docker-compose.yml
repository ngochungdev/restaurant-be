version: '3.9'

services:
  api:
    build:
      context: .
    container_name: restaurant_api
    restart: always
    ports:
      - '3000:3000'
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./src:/app
      - /app/node_modules

  postgres:
    image: postgres:16
    container_name: restaurant_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: restaurant_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: restaurant_redis
    restart: always
    ports:
      - '6379:6379'

  pgadmin:
    image: dpage/pgadmin4
    container_name: restaurant_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gmail.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - postgres

volumes:
  postgres_data: